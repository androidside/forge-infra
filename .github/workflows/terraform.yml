name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'modules/**'
      - 'environments/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      workspace:
        description: 'Workspace to deploy'
        required: true
        type: choice
        options:
          - shared
          - services
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.0"
  TF_VAR_domain_name: "viralclips.ai"
  TF_VAR_rds_publicly_accessible: "true"
  TF_VAR_rds_allowed_cidr_blocks: '["89.39.212.206/32", "107.142.32.250/32"]'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # --------------------------------------------------------------------------
  # Detect which workspaces changed
  # --------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      shared: ${{ steps.changes.outputs.shared }}
      services: ${{ steps.changes.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'modules/**'
              - 'environments/dev/shared/**'
            services:
              - 'modules/ecs-service/**'
              - 'environments/dev/services/**'

  # --------------------------------------------------------------------------
  # Plan / Apply for shared workspace
  # --------------------------------------------------------------------------
  shared:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.workspace == 'shared') ||
        (needs.detect-changes.result == 'success' && needs.detect-changes.outputs.shared == 'true')
      )
    defaults:
      run:
        working-directory: environments/dev/shared
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -no-color -out=tfplan
        continue-on-error: true

      - name: Force Unlock & Retry Plan
        id: retry_plan
        if: steps.plan.outcome == 'failure'
        run: |
          echo "Plan failed, checking for stale lock..."
          LOCK_ID=$(terraform plan -input=false -no-color 2>&1 | grep -oP 'ID:\s+\K[a-f0-9-]+' || true)
          if [ -n "$LOCK_ID" ]; then
            echo "Found stale lock $LOCK_ID, force-unlocking..."
            terraform force-unlock -force "$LOCK_ID"
            echo "Retrying plan..."
            terraform plan -input=false -no-color -out=tfplan
          else
            echo "No stale lock found, plan failed for another reason"
            exit 1
          fi

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan - Shared
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output.substring(0, 65536)
            });

      - name: Terraform Apply
        if: |
          (steps.plan.outcome == 'success' || steps.retry_plan.outcome == 'success') &&
          (
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
          )
        run: terraform apply -auto-approve tfplan

  # --------------------------------------------------------------------------
  # Plan / Apply for services workspace
  # --------------------------------------------------------------------------
  services:
    runs-on: ubuntu-latest
    needs: [detect-changes, shared]
    if: |
      always() &&
      (needs.shared.result == 'success' || needs.shared.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.workspace == 'services') ||
        (needs.detect-changes.result == 'success' && needs.detect-changes.outputs.services == 'true')
      )
    defaults:
      run:
        working-directory: environments/dev/services
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -no-color -out=tfplan
        continue-on-error: true

      - name: Force Unlock & Retry Plan
        id: retry_plan
        if: steps.plan.outcome == 'failure'
        run: |
          echo "Plan failed, checking for stale lock..."
          LOCK_ID=$(terraform plan -input=false -no-color 2>&1 | grep -oP 'ID:\s+\K[a-f0-9-]+' || true)
          if [ -n "$LOCK_ID" ]; then
            echo "Found stale lock $LOCK_ID, force-unlocking..."
            terraform force-unlock -force "$LOCK_ID"
            echo "Retrying plan..."
            terraform plan -input=false -no-color -out=tfplan
          else
            echo "No stale lock found, plan failed for another reason"
            exit 1
          fi

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan - Services
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output.substring(0, 65536)
            });

      - name: Terraform Apply
        if: |
          (steps.plan.outcome == 'success' || steps.retry_plan.outcome == 'success') &&
          (
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
          )
        run: terraform apply -auto-approve tfplan

  # --------------------------------------------------------------------------
  # Slack notification (skip on PR plan-only runs)
  # --------------------------------------------------------------------------
  notify:
    runs-on: ubuntu-latest
    needs: [detect-changes, shared, services]
    if: always() && github.event_name != 'pull_request'
    steps:
      - name: Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ (needs.shared.result == 'failure' || needs.services.result == 'failure') && 'failure' || 'success' }}
          fields: repo,message,commit,author,workflow
          channel: "#forge-deploys"
          text: |
            *Terraform Summary*

            *Environment:* Development
            *Commit:* `${{ github.sha }}`
            *Message:* ${{ github.event.head_commit.message }}
            *Author:* ${{ github.event.head_commit.author.name }}
            *Branch:* `${{ github.ref_name }}`
            *Trigger:* ${{ github.event_name == 'workflow_dispatch' && 'Manual' || 'Push' }}

            *Shared:* ${{ needs.shared.result == 'success' && ':white_check_mark: Applied' || needs.shared.result == 'skipped' && ':white_circle: No changes' || ':x: Failed' }}
            *Services:* ${{ needs.services.result == 'success' && ':white_check_mark: Applied' || needs.services.result == 'skipped' && ':white_circle: No changes' || ':x: Failed' }}

            ${{ (needs.shared.result == 'failure' || needs.services.result == 'failure') && ':x: Terraform apply failed. Please check the logs.' || ':white_check_mark: Terraform completed successfully!' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_FORGE_DEPLOYS_WEBHOOK_URL }}
